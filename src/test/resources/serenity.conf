webdriver {
  driver = chrome
  autodownload = true
  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = ["--headless=new", "--no-sandbox", "--disable-dev-shm-usage", "--window-size=1920,1080", "--disable-gpu", "--remote-allow-origins=*"]
    }
  }
}

headless.mode = true

serenity {
  project.name = "Reto Banitsmo - Skill Hacking"
  report.encoding = "UTF-8"
  take.screenshots = FOR_FAILURES
}

environments {
  default {
    webdriver.base.url = "https://www.bancolombia.com"
  }
}
